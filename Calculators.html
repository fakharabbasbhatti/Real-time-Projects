<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .calc {
      width: 320px;
      background: #ffffff;
      border-radius: 28px;
      border: 0.5px solid rgba(0,0,0,0.12);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }

    .display {
      background: #0f172a;
      padding: 1.5rem 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-height: 110px;
      justify-content: flex-end;
    }

    .expr {
      font-size: 13px;
      color: #64748b;
      min-height: 18px;
      text-align: right;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
    }

    .result {
      font-size: 2.8rem;
      font-weight: 500;
      color: #f8fafc;
      text-align: right;
      font-family: 'Courier New', monospace;
      line-height: 1.1;
      transition: font-size 0.1s;
      word-break: break-all;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(0,0,0,0.08);
    }

    .btn-grid > div {
      background: #ffffff;
    }

    .cb {
      width: 100%;
      aspect-ratio: 1;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 500;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background 0.1s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .cb:hover { background: #f1f5f9; }
    .cb:active { transform: scale(0.92); }

    .cb.op  { color: #3b82f6; }
    .cb.fn  { color: #64748b; font-size: 0.95rem; }
    .cb.cls { color: #ef4444; }

    .cb.eq {
      background: #3b82f6;
      color: #ffffff;
    }
    .cb.eq:hover  { background: #2563eb; }
    .cb.eq:active { transform: scale(0.92); }

    .zero-cell {
      grid-column: span 2;
    }

    .zero-cell .cb {
      aspect-ratio: auto;
      height: 64px;
      justify-content: flex-start;
      padding-left: 1.4rem;
    }

    @media (max-width: 360px) {
      .calc { width: 96vw; }
      .result { font-size: 2.2rem; }
      .cb { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="calc">
  <!-- Display -->
  <div class="display">
    <div class="expr" id="expr">0</div>
    <div class="result" id="res">0</div>
  </div>

  <!-- Button Grid -->
  <div class="btn-grid">
    <!-- Row 1 -->
    <div><button class="cb cls" data-a="clear"><i class="ti ti-refresh"></i> C</button></div>
    <div><button class="cb fn"  data-a="negate">±</button></div>
    <div><button class="cb fn"  data-a="percent">%</button></div>
    <div><button class="cb op"  data-a="divide">÷</button></div>
    <!-- Row 2 -->
    <div><button class="cb" data-a="7">7</button></div>
    <div><button class="cb" data-a="8">8</button></div>
    <div><button class="cb" data-a="9">9</button></div>
    <div><button class="cb op" data-a="multiply">×</button></div>
    <!-- Row 3 -->
    <div><button class="cb" data-a="4">4</button></div>
    <div><button class="cb" data-a="5">5</button></div>
    <div><button class="cb" data-a="6">6</button></div>
    <div><button class="cb op" data-a="subtract">−</button></div>
    <!-- Row 4 -->
    <div><button class="cb" data-a="1">1</button></div>
    <div><button class="cb" data-a="2">2</button></div>
    <div><button class="cb" data-a="3">3</button></div>
    <div><button class="cb op" data-a="add">+</button></div>
    <!-- Row 5 -->
    <div class="zero-cell"><button class="cb" data-a="0">0</button></div>
    <div><button class="cb fn" data-a="decimal">.</button></div>
    <div><button class="cb eq" data-a="equals">=</button></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const resEl  = document.getElementById('res');
  const exprEl = document.getElementById('expr');

  let cur = '0', prev = '', op = null, reset = false, evaled = false;

  function sym(o) {
    return { '+': '+', '-': '−', '*': '×', '/': '÷' }[o] || o;
  }

  function draw() {
    resEl.textContent = cur;
    resEl.style.fontSize =
      cur.length > 10 ? '1.9rem' :
      cur.length > 7  ? '2.3rem' : '2.8rem';

    if (op && prev)       exprEl.textContent = prev + ' ' + sym(op);
    else if (prev && !op) exprEl.textContent = prev;
    else                  exprEl.textContent = cur;
  }

  function clear() {
    cur = '0'; prev = ''; op = null; reset = false; evaled = false;
    draw();
  }

  function num(n) {
    if (evaled) { cur = '0'; prev = ''; op = null; evaled = false; }
    if (reset)  { cur = '0'; reset = false; }
    if (cur === '0' && n !== '.') { cur = n; }
    else {
      if (n === '.' && cur.includes('.')) return;
      if (cur.replace('-', '').replace('.', '').length >= 14) return;
      cur += n;
    }
    draw();
  }

  function doOp(o) {
    if (evaled) { prev = cur; op = o; reset = true; evaled = false; draw(); return; }
    if (op && !reset) calc(true);
    prev = cur; op = o; reset = true; evaled = false;
    draw();
  }

  function calc(chain = false) {
    if (!op || !prev) {
      if (!chain) { evaled = true; draw(); }
      return;
    }
    const p = parseFloat(prev), c = parseFloat(cur);
    if (isNaN(p) || isNaN(c)) {
      cur = 'Error'; op = null; prev = ''; reset = true; draw(); return;
    }
    let r;
    if      (op === '+') r = p + c;
    else if (op === '-') r = p - c;
    else if (op === '*') r = p * c;
    else if (op === '/') {
      if (c === 0) { cur = 'Error'; op = null; prev = ''; reset = true; draw(); return; }
      r = p / c;
    }
    if (!Number.isFinite(r)) {
      cur = 'Error'; op = null; prev = ''; reset = true; draw(); return;
    }
    cur = Number.isInteger(r) ? r.toString() : parseFloat(r.toPrecision(12)).toString();
    if (!chain) { op = null; prev = cur; evaled = true; reset = true; }
    else        { prev = cur; reset = true; }
    draw();
  }

  /* ── Button clicks ── */
  document.querySelectorAll('[data-a]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      const a = btn.getAttribute('data-a');
      if (/^[0-9]$/.test(a)) { num(a); return; }
      if (a === 'decimal')   { num('.'); return; }
      switch (a) {
        case 'clear':    clear(); break;
        case 'negate':
          if (cur !== '0' && cur !== 'Error') {
            cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
            draw();
          }
          break;
        case 'percent':
          if (cur !== '0' && cur !== 'Error') {
            cur = (parseFloat(cur) / 100).toString(); draw();
          }
          break;
        case 'add':      doOp('+'); break;
        case 'subtract': doOp('-'); break;
        case 'multiply': doOp('*'); break;
        case 'divide':   doOp('/'); break;
        case 'equals':   calc(false); break;
      }
    });
  });

  /* ── Keyboard support ── */
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') { e.preventDefault(); num(e.key); }
    else if (e.key === '.')           { e.preventDefault(); num('.'); }
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calc(false); }
    else if (e.key === '+')     { e.preventDefault(); doOp('+'); }
    else if (e.key === '-')     { e.preventDefault(); doOp('-'); }
    else if (e.key === '*')     { e.preventDefault(); doOp('*'); }
    else if (e.key === '/')     { e.preventDefault(); doOp('/'); }
    else if (e.key === '%')     { e.preventDefault(); const v = parseFloat(cur); if (!isNaN(v)) { cur = (v/100).toString(); draw(); } }
    else if (e.key === 'Escape'){ e.preventDefault(); clear(); }
    else if (e.key === 'Backspace') {
      e.preventDefault();
      if (cur.length > 1) cur = cur.slice(0, -1);
      else cur = '0';
      draw();
    }
  });

  draw();
})();
</script>
</body>
</html>
