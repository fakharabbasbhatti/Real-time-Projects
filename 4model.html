<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer · Three.js + Bootstrap</title>
    <!-- Bootstrap 5 CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
        }
        /* overlay UI – Bootstrap cards with glass effect */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;  /* allow click-through to canvas */
        }
        .ui-overlay .card {
            pointer-events: auto;  /* buttons clickable */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #f0f0f0;
            min-width: 180px;
        }
        .ui-overlay .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            letter-spacing: 1px;
        }
        .ui-overlay .btn-outline-light {
            border-color: rgba(255,255,255,0.3);
            color: #f0f0f0;
        }
        .ui-overlay .btn-outline-light:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }
        .badge-3d {
            background: #6c63ff;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 12px 28px;
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .info-panel i {
            color: #6c63ff;
            margin-right: 4px;
        }
        .info-panel .fa-rotate {
            animation: spin 6s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* responsive tweaks */
        @media (max-width: 576px) {
            .ui-overlay { top: 12px; left: 12px; }
            .ui-overlay .card { min-width: 140px; }
            .info-panel { font-size: 0.75rem; padding: 8px 16px; gap: 10px; flex-wrap: wrap; justify-content: center; width: 90%; }
        }
        /* hide Three.js warning if any */
        .no-select { user-select: none; }
    </style>
</head>
<body>

    <!-- 3D Canvas container -->
    <div id="canvas-container" class="no-select"></div>

    <!-- UI Overlay Top-Left -->
    <div class="ui-overlay">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-cube me-2" style="color: #6c63ff;"></i> 3D Model
            </div>
            <div class="card-body p-3">
                <div class="d-flex flex-column gap-2">
                    <button id="resetViewBtn" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sync-alt me-1"></i> Reset View
                    </button>
                    <button id="toggleRotateBtn" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-pause me-1"></i> <span id="rotateLabel">Pause</span>
                    </button>
                    <div class="mt-1 d-flex justify-content-between">
                        <span class="badge-3d"><i class="fas fa-arrows-rotate me-1"></i> Auto-Rotate</span>
                        <span class="badge-3d" style="background: #3b3b5c;"><i class="fas fa-mouse-pointer me-1"></i> Drag</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Info Panel -->
    <div class="info-panel">
        <span><i class="fas fa-cube"></i> Geometric Sculpture</span>
        <span><i class="fas fa-circle" style="color: #ff6b6b;"></i> 3D</span>
        <span><i class="fas fa-rotate fa-rotate"></i> rotating</span>
        <span><i class="fas fa-code"></i> Three.js</span>
    </div>

    <!-- Import Three.js & OrbitControls from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- setup scene, camera, renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);

        // renderer with transparency support (but we set bg via scene)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false; // not using shadows
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Controls (Orbit) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.5;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        controls.update();

        // --- Lighting ---
        // Ambient for base illumination
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Main directional light
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        scene.add(dirLight);

        // Fill light from back
        const backLight = new THREE.DirectionalLight(0x6c63ff, 0.6);
        backLight.position.set(-3, -1, -4);
        scene.add(backLight);

        // Add rim light
        const rimLight = new THREE.DirectionalLight(0xffb3b3, 0.4);
        rimLight.position.set(-2, 1, 5);
        scene.add(rimLight);

        // Soft hemisphere
        const hemiLight = new THREE.HemisphereLight(0x6c63ff, 0x3b3b5c, 0.5);
        scene.add(hemiLight);

        // Optional: small point light for sparkle
        const pointLight = new THREE.PointLight(0xffaa88, 0.3, 10);
        pointLight.position.set(1, 2, 3);
        scene.add(pointLight);

        // --- Create a "full 3D model" : a geometric sculpture with multiple shapes ---
        const group = new THREE.Group();

        // 1. Core: Icosahedron with wireframe + solid
        const geoIcosa = new THREE.IcosahedronGeometry(1.2, 0);
        const matIcosa = new THREE.MeshStandardMaterial({
            color: 0x6c63ff,
            roughness: 0.25,
            metalness: 0.6,
            emissive: new THREE.Color(0x1a1a3e),
            emissiveIntensity: 0.15,
            transparent: true,
            opacity: 0.85,
            wireframe: false
        });
        const core = new THREE.Mesh(geoIcosa, matIcosa);
        core.castShadow = true;
        core.receiveShadow = false;
        group.add(core);

        // wireframe overlay on core
        const wireMat = new THREE.MeshStandardMaterial({
            color: 0x9d8dff,
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const wireCore = new THREE.Mesh(geoIcosa.clone(), wireMat);
        wireCore.scale.set(1.01, 1.01, 1.01);
        group.add(wireCore);

        // 2. Orbiting rings / torus knots
        const knotMat = new THREE.MeshStandardMaterial({
            color: 0xff6b6b,
            roughness: 0.3,
            metalness: 0.4,
            emissive: new THREE.Color(0x330000),
            emissiveIntensity: 0.2
        });
        const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(0.9, 0.25, 64, 8, 2, 3), knotMat);
        knot.position.set(0, 0.2, 0);
        group.add(knot);

        // 3. Small floating spheres around (like electrons)
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x4fc3f7,
            roughness: 0.2,
            metalness: 0.7,
            emissive: new THREE.Color(0x0a2a4a),
            emissiveIntensity: 0.3
        });
        const spherePositions = [
            [1.8, 0.6, 0.8], [-1.6, -0.8, 1.2], [0.5, 1.9, -1.0], [-0.9, -1.7, -1.3], [1.3, -1.2, -1.5], [-1.9, 0.9, 0.5]
        ];
        spherePositions.forEach(pos => {
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), sphereMat);
            sphere.position.set(pos[0], pos[1], pos[2]);
            group.add(sphere);
        });

        // 4. Outer ring (torii)
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xf9ca24,
            roughness: 0.4,
            metalness: 0.3,
            emissive: new THREE.Color(0x332200),
            emissiveIntensity: 0.1,
            transparent: true,
            opacity: 0.4
        });
        const ring = new THREE.Mesh(new THREE.TorusGeometry(1.8, 0.05, 32, 64), ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.rotation.z = 0.3;
        group.add(ring);

        const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.04, 24, 48), ringMat);
        ring2.rotation.y = 0.8;
        ring2.rotation.x = 0.7;
        ring2.material = ringMat.clone();
        ring2.material.color.setHex(0x6c63ff);
        ring2.material.opacity = 0.3;
        group.add(ring2);

        // 5. Little stars / spikes (using small cones)
        const spikeMat = new THREE.MeshStandardMaterial({
            color: 0xffb74d,
            emissive: new THREE.Color(0x331100),
            emissiveIntensity: 0.2
        });
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const radius = 1.4;
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 6), spikeMat);
            cone.position.set(Math.cos(angle) * radius, Math.sin(angle * 2) * 0.5, Math.sin(angle) * radius);
            cone.rotation.set(angle, angle, 0);
            group.add(cone);
        }

        // final group to scene
        scene.add(group);

        // subtle grid helper (transparent)
        const gridHelper = new THREE.GridHelper(8, 12, 0x6c63ff, 0x3b3b5c);
        gridHelper.position.y = -1.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);

        // some floating particles (tiny)
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 400;
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i += 3) {
            const r = 5 + Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            positions[i] = r * Math.sin(phi) * Math.cos(theta);
            positions[i+1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i+2] = r * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x8f8cff,
            size: 0.04,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // --- UI interaction ---
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.set(5, 4, 8);
            controls.target.set(0, 0, 0);
            controls.update();
        });

        const toggleBtn = document.getElementById('toggleRotateBtn');
        const rotateLabel = document.getElementById('rotateLabel');
        let isAutoRotate = true;
        toggleBtn.addEventListener('click', () => {
            isAutoRotate = !isAutoRotate;
            controls.autoRotate = isAutoRotate;
            rotateLabel.textContent = isAutoRotate ? 'Pause' : 'Resume';
            toggleBtn.innerHTML = `<i class="fas ${isAutoRotate ? 'fa-pause' : 'fa-play'} me-1"></i> ${rotateLabel.textContent}`;
        });

        // --- Window resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);

            // rotate inner group independently for extra motion (optional)
            group.rotation.y += 0.0015;
            group.rotation.x = Math.sin(Date.now() * 0.0003) * 0.05;
            group.rotation.z += 0.0008;

            // animate particles slowly
            particles.rotation.y += 0.0002;
            particles.rotation.x += 0.0001;

            controls.update(); // for damping and autoRotate

            renderer.render(scene, camera);
        }

        animate();

        // small startup log (optional)
        console.log('3D Model Viewer with Three.js, Bootstrap & Font Awesome');
    </script>

    <!-- Bootstrap JS bundle (optional but for any toggles etc) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
