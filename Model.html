  <style>
    body {

    .ui-overlay {

      top: 20px;
      left: 20px;
      z-index: 20;
      pointer-events: none;
    }
    .ui-overlay .card {
      pointer-events: auto;
      background: rgba(10, 10, 25, 0.65);

      font-weight: 600;
      letter-spacing: 0.3px;
      color: #d0cfff;
    }
    .ui-overlay .btn-outline-light {
      border-color: rgba(255,255,255,0.15);
      color: #e0e0f0;
      border-radius: 40px;
      font-weight: 500;
    }
    .ui-overlay .btn-outline-light:hover {
      background: rgba(255, 215, 255, 0.08);
      border-color: #b8a5ff;
      color: #fff;
    }
    .badge-woman {
      background: linear-gradient(145deg, #c084fc, #a78bfa);
      color: #0f0f1a;
      padding: 5px 14px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
    }
    .info-panel {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(12, 12, 24, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 60px;
      padding: 10px 28px;
      color: #c8c8e0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 18px;
      pointer-events: none;
      white-space: nowrap;
    }
    .info-panel i {
      color: #b8a5ff;
      margin-right: 6px;
    }
    .info-panel .fa-rotate {
      animation: spin 8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @media (max-width: 640px) {
      .ui-overlay { top: 12px; left: 12px; }
      .ui-overlay .card { min-width: 150px; }

    womanGroup.add(legR);

    // --- Shoes ---
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x2d1b3d, roughness: 0.4, metalness: 0.2 });
    const shoeL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), shoeMat);
    shoeL.position.set(-0.35, -0.45, 0.08);
    shoeL.scale.set(1, 0.4, 1.3);
    womanGroup.add(shoeL);
    const shoeR = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), shoeMat);
    shoeR.position.set(0.35, -0.45, 0.08);
    shoeR.scale.set(1, 0.4, 1.3);
    womanGroup.add(shoeR);

    // --- Hair (simple bob to frame face) ---
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x3d1f1a, roughness: 0.8 });
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.58, 16, 16), hairMat);
    hair.position.set(0, 2.05, -0.08);
    hair.scale.set(1.05, 0.5, 0.9);
    hair.castShadow = true;
    womanGroup.add(hair);

    const hairBack = new THREE.Mesh(new THREE.SphereGeometry(0.52, 16, 16), hairMat);
    hairBack.position.set(0, 1.9, -0.35);
    hairBack.scale.set(1.05, 0.5, 0.4);
    hairBack.castShadow = true;
    womanGroup.add(hairBack);

    // --- Accessory: pendant ---
    const accMat = new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.2, metalness: 0.6 });
    const pendant = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), accMat);
    pendant.position.set(0, 1.3, 0.45);
    womanGroup.add(pendant);

    // Position the whole group
    womanGroup.position.y = 0.2;
    scene.add(womanGroup);

    // --- Ground (shadow catcher) ---
    const planeMat = new THREE.ShadowMaterial({ opacity: 0.4 });
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = -0.45;
    plane.receiveShadow = true;
    scene.add(plane);

    // --- Particles for ambiance ---
    const particleCount = 150;
    const particleGeo = new THREE.BufferGeometry();
    const pos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i += 3) {
      const r = 2.0 + Math.random() * 3.0;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      pos[i] = r * Math.sin(phi) * Math.cos(theta);
      pos[i+1] = r * Math.sin(phi) * Math.sin(theta) + 0.8;
      pos[i+2] = r * Math.cos(phi);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xc4b5ff,
      size: 0.03,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // --- UI controls ---
    document.getElementById('resetViewBtn').addEventListener('click', () => {
      camera.position.set(3.2, 2.5, 5.5);
      controls.target.set(0, 0.8, 0);
      controls.update();
    });

    const toggleBtn = document.getElementById('toggleRotateBtn');
    const rotateLabel = document.getElementById('rotateLabel');
    let isAutoRotate = true;
    toggleBtn.addEventListener('click', () => {
      isAutoRotate = !isAutoRotate;
      controls.autoRotate = isAutoRotate;
      rotateLabel.textContent = isAutoRotate ? 'Pause' : 'Resume';
      toggleBtn.innerHTML = `<i class="fas ${isAutoRotate ? 'fa-pause' : 'fa-play'} me-1"></i> ${rotateLabel.textContent}`;
    });

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Animation ---
    function animate() {
      requestAnimationFrame(animate);
      
      // subtle floating
      womanGroup.position.y = 0.2 + Math.sin(Date.now() * 0.001) * 0.03;
      particles.rotation.y += 0.0005;
      
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    console.log('3D Woman with real image texture loaded.');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
