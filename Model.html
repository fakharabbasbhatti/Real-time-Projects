<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Woman Model · Three.js + Bootstrap</title>
  <!-- Bootstrap 5 + Font Awesome 6 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1e1e2f;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    /* Glass-morphism UI overlay */
    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      pointer-events: none;
    }
    .ui-overlay .card {
      pointer-events: auto;
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      color: #f0f0f5;
      min-width: 190px;
      border-radius: 20px;
    }
    .ui-overlay .card-header {
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #d0cfff;
    }
    .ui-overlay .btn-outline-light {
      border-color: rgba(255,255,255,0.15);
      color: #e0e0f0;
      border-radius: 40px;
      font-weight: 500;
    }
    .ui-overlay .btn-outline-light:hover {
      background: rgba(255, 215, 255, 0.08);
      border-color: #b8a5ff;
      color: #fff;
    }
    .badge-woman {
      background: linear-gradient(145deg, #c084fc, #a78bfa);
      color: #0f0f1a;
      padding: 5px 14px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
    }
    .info-panel {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(12, 12, 24, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 60px;
      padding: 10px 28px;
      color: #c8c8e0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 18px;
      pointer-events: none;
      white-space: nowrap;
    }
    .info-panel i {
      color: #b8a5ff;
      margin-right: 6px;
    }
    .info-panel .fa-rotate {
      animation: spin 8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @media (max-width: 640px) {
      .ui-overlay { top: 12px; left: 12px; }
      .ui-overlay .card { min-width: 150px; }
      .info-panel { font-size: 0.7rem; padding: 6px 14px; gap: 10px; white-space: normal; flex-wrap: wrap; justify-content: center; width: 92%; }
    }
  </style>
</head>
<body>

  <!-- 3D container -->
  <div id="canvas-container"></div>

  <!-- UI Overlay Top-Left -->
  <div class="ui-overlay">
    <div class="card">
      <div class="card-header">
        <i class="fas fa-female me-2" style="color: #c084fc;"></i> 3D Woman
      </div>
      <div class="card-body p-3">
        <div class="d-flex flex-column gap-2">
          <button id="resetViewBtn" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sync-alt me-1"></i> Reset View
          </button>
          <button id="toggleRotateBtn" class="btn btn-outline-light btn-sm">
            <i class="fas fa-pause me-1"></i> <span id="rotateLabel">Pause</span>
          </button>
          <div class="mt-1 d-flex justify-content-between">
            <span class="badge-woman"><i class="fas fa-arrows-rotate me-1"></i> Auto</span>
            <span class="badge-woman" style="background: #4a4a6a; color: #ddd;"><i class="fas fa-mouse-pointer me-1"></i> Drag</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom info -->
  <div class="info-panel">
    <span><i class="fas fa-female"></i> Feminine form</span>
    <span><i class="fas fa-circle" style="color: #f472b6;"></i> 3D</span>
    <span><i class="fas fa-rotate fa-rotate"></i> rotating</span>
    <span><i class="fas fa-code"></i> Three.js</span>
  </div>

  <!-- Three.js import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- setup scene ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e1e2f);

    // camera
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3.5, 2.8, 6);
    camera.lookAt(0, 0.8, 0);

    // renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // --- controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.8;
    controls.target.set(0, 0.8, 0);
    controls.update();

    // --- lights ---
    const ambient = new THREE.AmbientLight(0x40406b, 0.5);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xfff0f5, 1.2);
    mainLight.position.set(2, 5, 4);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0xc4b5ff, 0.6);
    fillLight.position.set(-3, 1, 2);
    scene.add(fillLight);

    const backLight = new THREE.DirectionalLight(0xff8a9f, 0.4);
    backLight.position.set(0, 1, -5);
    scene.add(backLight);

    const rim = new THREE.DirectionalLight(0x9f7aea, 0.5);
    rim.position.set(-1, 2, 4);
    scene.add(rim);

    const hemi = new THREE.HemisphereLight(0x9f7aea, 0x2a1e3c, 0.6);
    scene.add(hemi);

    // --- build a stylized female human form using primitives ---
    const womanGroup = new THREE.Group();

    // Materials
    const skinMat = new THREE.MeshStandardMaterial({
      color: 0xf5d0c6,
      roughness: 0.5,
      metalness: 0.05,
      emissive: new THREE.Color(0x2a1a1a),
      emissiveIntensity: 0.05
    });
    const skinMatDark = new THREE.MeshStandardMaterial({
      color: 0xe8b8a8,
      roughness: 0.5,
      metalness: 0.05
    });
    const dressMat = new THREE.MeshStandardMaterial({
      color: 0x9f7aea,
      roughness: 0.3,
      metalness: 0.1,
      emissive: new THREE.Color(0x2a1a4a),
      emissiveIntensity: 0.1
    });
    const dressMat2 = new THREE.MeshStandardMaterial({
      color: 0x7c3aed,
      roughness: 0.3,
      metalness: 0.1,
      emissive: new THREE.Color(0x1a0a2a),
      emissiveIntensity: 0.1
    });
    const hairMat = new THREE.MeshStandardMaterial({
      color: 0x3d1f1a,
      roughness: 0.8,
      metalness: 0.05
    });
    const eyeMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a2a,
      roughness: 0.1,
      metalness: 0.1
    });
    const eyeWhiteMat = new THREE.MeshStandardMaterial({
      color: 0xf0f0ff,
      roughness: 0.2
    });
    const lipMat = new THREE.MeshStandardMaterial({
      color: 0xd45a6a,
      roughness: 0.3
    });
    const accMat = new THREE.MeshStandardMaterial({
      color: 0xfbbf24,
      roughness: 0.2,
      metalness: 0.6,
      emissive: new THREE.Color(0x331a00),
      emissiveIntensity: 0.1
    });

    // ---- Torso (upper body) ----
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.9, 1.2, 12), skinMat);
    torso.position.set(0, 0.9, 0);
    torso.castShadow = true;
    womanGroup.add(torso);

    // ---- Neck ----
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.25, 8), skinMat);
    neck.position.set(0, 1.6, 0);
    neck.castShadow = true;
    womanGroup.add(neck);

    // ---- Head ----
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), skinMat);
    head.position.set(0, 1.95, 0);
    head.scale.set(1, 1.05, 0.9);
    head.castShadow = true;
    womanGroup.add(head);

    // ---- Hair (simple bob) ----
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 16), hairMat);
    hair.position.set(0, 2.05, -0.08);
    hair.scale.set(1.05, 0.55, 0.9);
    hair.castShadow = true;
    womanGroup.add(hair);

    // hair back
    const hairBack = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), hairMat);
    hairBack.position.set(0, 1.9, -0.35);
    hairBack.scale.set(1.05, 0.5, 0.4);
    hairBack.castShadow = true;
    womanGroup.add(hairBack);

    // ---- Eyes ----
    const eyeGeo = new THREE.SphereGeometry(0.1, 12, 12);
    // left eye white
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), eyeWhiteMat);
    eyeL.position.set(-0.2, 2.05, 0.42);
    womanGroup.add(eyeL);
    // right eye white
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), eyeWhiteMat);
    eyeR.position.set(0.2, 2.05, 0.42);
    womanGroup.add(eyeR);
    // pupils
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), eyeMat);
    pupilL.position.set(-0.2, 2.03, 0.50);
    womanGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), eyeMat);
    pupilR.position.set(0.2, 2.03, 0.50);
    womanGroup.add(pupilR);

    // ---- Lips (simple) ----
    const lip = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.04, 8, 12), lipMat);
    lip.position.set(0, 1.88, 0.44);
    lip.rotation.x = 0.1;
    lip.rotation.z = 0.1;
    lip.scale.set(1, 0.7, 0.4);
    womanGroup.add(lip);
    const lipLower = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03, 8, 12), lipMat);
    lipLower.position.set(0, 1.82, 0.44);
    lipLower.rotation.x = -0.1;
    lipLower.scale.set(0.9, 0.6, 0.4);
    womanGroup.add(lipLower);

    // ---- Dress (skirt + top) ----
    // skirt (cone)
    const skirt = new THREE.Mesh(new THREE.ConeGeometry(1.2, 0.9, 12), dressMat);
    skirt.position.set(0, 0.4, 0);
    skirt.scale.set(1, 0.9, 1);
    skirt.castShadow = true;
    womanGroup.add(skirt);
    // top part of dress (over torso)
    const dressTop = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.75, 0.4, 12), dressMat2);
    dressTop.position.set(0, 0.75, 0);
    dressTop.castShadow = true;
    womanGroup.add(dressTop);

    // ---- Arms (simple cylinders) ----
    const armMat = skinMatDark;
    // left arm
    const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.8, 8), armMat);
    armL.position.set(-0.9, 1.2, 0);
    armL.rotation.z = 0.3;
    armL.rotation.x = -0.2;
    armL.castShadow = true;
    womanGroup.add(armL);
    // right arm
    const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.8, 8), armMat);
    armR.position.set(0.9, 1.2, 0);
    armR.rotation.z = -0.3;
    armR.rotation.x = 0.2;
    armR.castShadow = true;
    womanGroup.add(armR);

    // ---- Legs ----
    const legMat = new THREE.MeshStandardMaterial({ color: 0xdbb0a0, roughness: 0.6 });
    // left leg
    const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.7, 8), legMat);
    legL.position.set(-0.35, -0.1, 0);
    legL.castShadow = true;
    womanGroup.add(legL);
    // right leg
    const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.7, 8), legMat);
    legR.position.set(0.35, -0.1, 0);
    legR.castShadow = true;
    womanGroup.add(legR);

    // ---- Shoes (tiny) ----
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x2d1b3d, roughness: 0.4, metalness: 0.2 });
    const shoeL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), shoeMat);
    shoeL.position.set(-0.35, -0.45, 0.08);
    shoeL.scale.set(1, 0.4, 1.3);
    womanGroup.add(shoeL);
    const shoeR = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), shoeMat);
    shoeR.position.set(0.35, -0.45, 0.08);
    shoeR.scale.set(1, 0.4, 1.3);
    womanGroup.add(shoeR);

    // ---- Accessory: a small necklace / pendant ----
    const pendant = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), accMat);
    pendant.position.set(0, 1.3, 0.45);
    womanGroup.add(pendant);
    const chain = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.02, 8, 12), accMat);
    chain.position.set(0, 1.4, 0.4);
    chain.rotation.x = Math.PI/2;
    chain.scale.set(1, 1, 0.4);
    womanGroup.add(chain);

    // ---- add group to scene ----
    womanGroup.position.y = 0.2; // lift a bit
    scene.add(womanGroup);

    // ---- Ground plane (invisible but for shadow) ----
    const planeMat = new THREE.ShadowMaterial({ opacity: 0.4 });
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = -0.45;
    plane.receiveShadow = true;
    scene.add(plane);

    // ---- decorative particles (floating) ----
    const particleCount = 180;
    const particleGeo = new THREE.BufferGeometry();
    const pos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i += 3) {
      const r = 2.2 + Math.random() * 2.8;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      pos[i] = r * Math.sin(phi) * Math.cos(theta);
      pos[i+1] = r * Math.sin(phi) * Math.sin(theta) + 0.8;
      pos[i+2] = r * Math.cos(phi);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xc4b5ff,
      size: 0.03,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // subtle ring
    const ringGeo = new THREE.TorusGeometry(1.8, 0.02, 16, 60);
    const ringMat2 = new THREE.MeshStandardMaterial({
      color: 0x7c3aed,
      emissive: new THREE.Color(0x2a1a4a),
      transparent: true,
      opacity: 0.2
    });
    const ring = new THREE.Mesh(ringGeo, ringMat2);
    ring.position.y = 0.8;
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
    const ring2 = new THREE.Mesh(ringGeo, ringMat2);
    ring2.position.y = 0.8;
    ring2.rotation.z = 0.6;
    ring2.rotation.x = 0.8;
    ring2.material = ringMat2.clone();
    ring2.material.opacity = 0.15;
    scene.add(ring2);

    // --- UI listeners ---
    document.getElementById('resetViewBtn').addEventListener('click', () => {
      camera.position.set(3.5, 2.8, 6);
      controls.target.set(0, 0.8, 0);
      controls.update();
    });

    const toggleBtn = document.getElementById('toggleRotateBtn');
    const rotateLabel = document.getElementById('rotateLabel');
    let isAutoRotate = true;
    toggleBtn.addEventListener('click', () => {
      isAutoRotate = !isAutoRotate;
      controls.autoRotate = isAutoRotate;
      rotateLabel.textContent = isAutoRotate ? 'Pause' : 'Resume';
      toggleBtn.innerHTML = `<i class="fas ${isAutoRotate ? 'fa-pause' : 'fa-play'} me-1"></i> ${rotateLabel.textContent}`;
    });

    // --- resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- animation ---
    function animate() {
      requestAnimationFrame(animate);
      
      // subtle floating motion for the woman group
      womanGroup.position.y = 0.2 + Math.sin(Date.now() * 0.001) * 0.03;
      // rotate particles
      particles.rotation.y += 0.0005;
      ring.rotation.z += 0.002;
      ring2.rotation.x += 0.001;
      
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    console.log('3D Woman model loaded with Bootstrap + Font Awesome');
  </script>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
