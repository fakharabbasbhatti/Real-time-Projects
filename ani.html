<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Team Showcase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f0f10;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:50px;
overflow-x:hidden;
}

.container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.card{
position:relative;
width:260px;
height:360px;
cursor:pointer;
overflow:hidden;
border-radius:22px;
background:#181818;
transition:.5s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.7s ease;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.9),
rgba(0,0,0,.2),
transparent);
opacity:0;
transition:.5s;
}

.info{
position:absolute;
bottom:40px;
left:25px;
overflow:hidden;
}

.name{
font-size:34px;
font-weight:700;
line-height:1;
color:white;
display:flex;
flex-direction:column;
}

.name span{
transform:translateY(120%);
transition:.45s cubic-bezier(.19,1,.22,1);
}

.role{
margin-top:12px;
color:#bbbbbb;
font-size:15px;
opacity:0;
transform:translateY(20px);
transition:.5s;
letter-spacing:2px;
text-transform:uppercase;
}

.card:hover img{
transform:scale(1.12) rotate(2deg);
filter:grayscale(20%);
}

.card:hover .overlay{
opacity:1;
}

.card:hover{
transform:translateY(-12px);
box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.card:hover .role{
opacity:1;
transform:translateY(0);
transition-delay:.25s;
}

.card:hover .name span{
transform:translateY(0);
}

.name span:nth-child(1){
transition-delay:.05s;
}

.name span:nth-child(2){
transition-delay:.12s;
}

.name span:nth-child(3){
transition-delay:.18s;
}

.name span:nth-child(4){
transition-delay:.24s;
}

.name span:nth-child(5){
transition-delay:.30s;
}

.name span:nth-child(6){
transition-delay:.36s;
}

@media(max-width:700px){

.card{
width:90%;
height:420px;
}

}

</style>

</head>
<body>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800" alt="">
<div class="overlay"></div>

<div class="info">
<div class="name"></div>
<div class="role">Creative Director</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800" alt="">
<div class="overlay"></div>

<div class="info">
<div class="name"></div>
<div class="role">UI Designer</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800" alt="">
<div class="overlay"></div>

<div class="info">
<div class="name"></div>
<div class="role">Frontend Developer</div>
</div>
</div>

</div>

<script>

const names=[
"JAMES",
"EMILY",
"ALEX"
];

document.querySelectorAll(".card").forEach((card,index)=>{

const holder=card.querySelector(".name");

names[index].split("").forEach(letter=>{

const span=document.createElement("span");
span.textContent=letter;
holder.appendChild(span);

});

card.addEventListener("mousemove",(e)=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

card.style.setProperty("--x",x+"px");
card.style.setProperty("--y",y+"px");

});

});

</script>

</body>
</html>
