<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaPulse AI · Premium Image Generator</title>
  <!-- Google Font Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body {
      background: radial-gradient(circle at 10% 20%, #0b0e1a, #05070e 90%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    /* glassmorphism card */
    .glass {
      background: rgba(20, 25, 45, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }
    .glass-light {
      background: rgba(30, 35, 60, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .gradient-text {
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-primary {
      background: linear-gradient(145deg, #6c5ce7, #3b82f6);
      transition: all 0.25s ease;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.5);
    }
    .btn-primary:active { transform: scale(0.97); }
    .input-dark {
      background: rgba(10, 14, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      transition: 0.2s;
    }
    .input-dark:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
      outline: none;
      background: rgba(10, 14, 30, 0.9);
    }
    .input-dark::placeholder { color: #94a3b8; }
    select.input-dark option { background: #1e1f2e; }
    .gallery-img {
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .gallery-img:hover {
      transform: scale(1.02) translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
      border-color: rgba(167, 139, 250, 0.3);
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      background: rgba(20, 25, 45, 0.9);
      backdrop-filter: blur(12px);
      border-left: 6px solid #818cf8;
      padding: 1rem 1.8rem;
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      transform: translateY(120%);
      transition: transform 0.4s ease, opacity 0.3s;
      opacity: 0;
      color: #f1f5f9;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.error { border-left-color: #f87171; }
    .toast.success { border-left-color: #34d399; }
    #previewContainer {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #imagePreview {
      max-height: 480px;
      object-fit: contain;
      border-radius: 24px;
      background: rgba(0,0,0,0.3);
    }
    .footer a {
      transition: color 0.2s, transform 0.2s;
      display: inline-block;
    }
    .footer a:hover {
      color: #a78bfa;
      transform: scale(1.1);
    }
    /* custom scroll */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0b0e1a; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 40px; }
  </style>
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" class="toast"><i id="toastIcon" class="fas fa-check-circle text-indigo-400"></i> <span id="toastMessage">Done</span></div>

  <!-- Navbar -->
  <nav class="w-full py-4 px-6 md:px-12 flex justify-between items-center glass border-b border-white/5 sticky top-0 z-50">
    <div class="flex items-center gap-2 text-white font-bold text-2xl tracking-tight" data-aos="fade-right" data-aos-duration="800">
      <i class="fas fa-sparkles text-indigo-400"></i>
      <span class="gradient-text">NovaPulse</span><span class="text-sm font-light text-gray-300 hidden sm:inline">.ai</span>
    </div>
    <div class="hidden md:flex items-center gap-8 text-gray-300 font-medium">
      <a href="#" class="hover:text-white transition">Home</a>
      <a href="#" class="hover:text-white transition">Gallery</a>
      <a href="#" class="hover:text-white transition">Pricing</a>
      <a href="#" class="hover:text-white transition">Community</a>
    </div>
    <div class="flex items-center gap-4">
      <button class="text-white/70 hover:text-white transition text-lg"><i class="fas fa-moon"></i></button>
      <button class="bg-indigo-600/20 text-indigo-300 px-5 py-2 rounded-full border border-indigo-400/30 hover:bg-indigo-500/30 transition text-sm font-semibold backdrop-blur-sm hidden sm:block">Sign In</button>
      <button class="bg-indigo-500 text-white px-5 py-2 rounded-full text-sm font-semibold shadow-lg shadow-indigo-500/30 hover:shadow-indigo-400/50 transition">Get Started</button>
    </div>
  </nav>

  <!-- Main container -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <!-- Hero -->
    <section class="text-center py-8" data-aos="fade-up" data-aos-duration="1000">
      <h1 class="text-4xl sm:text-6xl font-extrabold leading-tight">
        <span class="text-white">Generate </span>
        <span class="gradient-text">Stunning AI</span><br>
        <span class="text-white">Images in Seconds</span>
      </h1>
      <p class="text-gray-400 text-lg max-w-2xl mx-auto mt-4 font-light">Describe your vision, choose a style, and let AI create breathtaking visuals.</p>
    </section>

    <!-- Generator Card -->
    <div class="glass rounded-3xl p-6 md:p-10 max-w-5xl mx-auto mt-6" data-aos="fade-up" data-aos-delay="150">
      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

        <!-- left: inputs -->
        <div class="lg:col-span-3 space-y-5">
          <!-- Prompt -->
          <div>
            <label class="text-gray-300 text-sm font-medium flex items-center gap-2 mb-1.5"><i class="fas fa-pencil-alt text-indigo-400"></i> Prompt</label>
            <textarea id="promptInput" rows="3" class="input-dark w-full rounded-2xl p-4 text-sm resize-none" placeholder="A cyberpunk cat with neon glowing eyes, rainy street...">A majestic dragon flying over a futuristic city, digital art, vibrant colors</textarea>
          </div>
          <!-- Negative prompt -->
          <div>
            <label class="text-gray-300 text-sm font-medium flex items-center gap-2 mb-1.5"><i class="fas fa-ban text-rose-400"></i> Negative prompt</label>
            <input id="negativeInput" type="text" class="input-dark w-full rounded-2xl p-4 text-sm" placeholder="blurry, distorted, low quality, ugly" value="blurry, low quality">
          </div>

          <!-- row: style + size -->
          <div class="flex flex-wrap gap-4">
            <div class="flex-1 min-w-[140px]">
              <label class="text-gray-300 text-sm font-medium flex items-center gap-2 mb-1.5"><i class="fas fa-palette text-pink-400"></i> Style</label>
              <select id="styleSelect" class="input-dark w-full rounded-2xl p-3.5 text-sm appearance-none cursor-pointer">
                <option value="Realistic">Realistic</option>
                <option value="Anime" selected>Anime</option>
                <option value="3D">3D</option>
                <option value="Digital Art">Digital Art</option>
                <option value="Cyberpunk">Cyberpunk</option>
                <option value="Fantasy">Fantasy</option>
              </select>
            </div>
            <div class="flex-1 min-w-[140px]">
              <label class="text-gray-300 text-sm font-medium flex items-center gap-2 mb-1.5"><i class="fas fa-expand text-blue-400"></i> Size</label>
              <select id="sizeSelect" class="input-dark w-full rounded-2xl p-3.5 text-sm appearance-none cursor-pointer">
                <option value="512x512">512x512</option>
                <option value="768x768" selected>768x768</option>
                <option value="1024x1024">1024x1024</option>
              </select>
            </div>
          </div>

          <!-- generate button -->
          <button id="generateBtn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 transition">
            <i class="fas fa-wand-magic-sparkles"></i> Generate Image
          </button>

          <!-- action row: copy prompt + download (hidden until image) -->
          <div id="actionRow" class="flex gap-3 pt-1 opacity-0 pointer-events-none transition-opacity duration-300">
            <button id="copyPromptBtn" class="flex-1 bg-white/5 hover:bg-white/10 rounded-xl py-2.5 text-gray-300 text-sm flex items-center justify-center gap-2 border border-white/5 transition"><i class="far fa-copy"></i> Copy Prompt</button>
            <button id="downloadBtn" class="flex-1 bg-white/5 hover:bg-white/10 rounded-xl py-2.5 text-gray-300 text-sm flex items-center justify-center gap-2 border border-white/5 transition"><i class="fas fa-download"></i> Download</button>
          </div>
        </div>

        <!-- right: preview & gallery -->
        <div class="lg:col-span-2 space-y-5">
          <div class="glass-light rounded-2xl p-4">
            <p class="text-gray-400 text-xs uppercase tracking-wider flex items-center gap-2"><i class="fas fa-image text-indigo-300"></i> Preview</p>
            <div id="previewContainer" class="mt-2">
              <img id="imagePreview" src="https://placehold.co/600x400/141b2b/818cf8?text=✨+Your+AI+image+will+appear+here" alt="preview" class="w-full rounded-xl shadow-2xl">
            </div>
          </div>

          <!-- gallery -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <p class="text-gray-400 text-xs uppercase tracking-wider flex items-center gap-2"><i class="fas fa-th text-indigo-300"></i> Gallery</p>
              <span class="text-gray-500 text-xs">click to preview</span>
            </div>
            <div id="galleryGrid" class="grid grid-cols-3 gap-2.5">
              <!-- sample gallery images (dummy) -->
              <img src="https://placehold.co/200x200/1e293b/818cf8?text=AI+1" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/a78bfa?text=Cyber+Dragon">
              <img src="https://placehold.co/200x200/1e293b/a78bfa?text=AI+2" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/60a5fa?text=Neon+City">
              <img src="https://placehold.co/200x200/1e293b/34d399?text=AI+3" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/34d399?text=Fantasy+Forest">
              <!-- more dummy placeholders -->
              <img src="https://placehold.co/200x200/1e293b/f472b6?text=AI+4" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/f472b6?text=Anime+Girl">
              <img src="https://placehold.co/200x200/1e293b/facc15?text=AI+5" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/facc15?text=3D+Robot">
              <img src="https://placehold.co/200x200/1e293b/2dd4bf?text=AI+6" alt="gallery" class="gallery-img rounded-xl w-full aspect-square object-cover" data-src="https://placehold.co/600x400/2d3748/2dd4bf?text=Cyberpunk">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-20 pt-8 pb-6 border-t border-white/5 text-gray-400 text-sm flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <i class="fas fa-sparkles text-indigo-400"></i>
        <span class="font-semibold text-white/80">NovaPulse.ai</span>
        <span class="hidden sm:inline">·</span>
        <span class="hidden sm:inline">© 2026 All rights reserved</span>
      </div>
      <div class="flex gap-6 text-lg">
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="#" aria-label="Dribbble"><i class="fab fa-dribbble"></i></a>
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
      </div>
      <div class="flex gap-4 text-xs text-gray-500">
        <a href="#" class="hover:text-gray-300">Privacy</a>
        <a href="#" class="hover:text-gray-300">Terms</a>
        <a href="#" class="hover:text-gray-300">Cookies</a>
      </div>
    </footer>
  </main>

  <!-- AOS & Scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // INIT AOS
    AOS.init({ once: true, offset: 20 });

    // DOM refs
    const promptInput = document.getElementById('promptInput');
    const negativeInput = document.getElementById('negativeInput');
    const styleSelect = document.getElementById('styleSelect');
    const sizeSelect = document.getElementById('sizeSelect');
    const generateBtn = document.getElementById('generateBtn');
    const imagePreview = document.getElementById('imagePreview');
    const actionRow = document.getElementById('actionRow');
    const copyPromptBtn = document.getElementById('copyPromptBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');
    const galleryImgs = document.querySelectorAll('.gallery-img');

    // --- toast helper ---
    function showToast(message, type = 'success') {
      toast.className = 'toast show';
      if (type === 'error') {
        toast.classList.add('error');
        toastIcon.className = 'fas fa-exclamation-circle text-rose-400';
      } else {
        toast.classList.add('success');
        toastIcon.className = 'fas fa-check-circle text-emerald-400';
      }
      toastMessage.textContent = message;
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
        toast.classList.remove('error', 'success');
      }, 3200);
    }

    // --- generate image (simulated) ---
    function generateImage() {
      const prompt = promptInput.value.trim() || 'a beautiful landscape';
      const negative = negativeInput.value.trim() || 'none';
      const style = styleSelect.value;
      const size = sizeSelect.value;

      // Loading state
      generateBtn.disabled = true;
      generateBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Generating...`;
      imagePreview.src = 'https://placehold.co/600x400/1a1f2e/818cf8?text=⏳+Creating...';

      // Simulate AI generation
      setTimeout(() => {
        // dummy generated image (using placeholder with parameters)
        const seed = Math.floor(Math.random() * 1000);
        const w = size.split('x')[0];
        const h = size.split('x')[1];
        const color1 = ['818cf8','a78bfa','60a5fa','34d399','f472b6','facc15','2dd4bf'][Math.floor(Math.random()*7)];
        const color2 = ['1a1f2e','2d3748','1e293b','0f172a'][Math.floor(Math.random()*4)];
        const generatedUrl = `https://placehold.co/${w}x${h}/${color2}/${color1}?text=✨+AI+${style}+${seed}`;
        
        imagePreview.src = generatedUrl;
        imagePreview.alt = `Generated ${style} image`;
        actionRow.classList.remove('opacity-0', 'pointer-events-none');
        // store generated image for download
        imagePreview.dataset.generated = generatedUrl;

        generateBtn.disabled = false;
        generateBtn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i> Generate Image`;
        showToast('✨ Image generated successfully!', 'success');

        // add to gallery (first position)
        const galleryGrid = document.getElementById('galleryGrid');
        const newImg = document.createElement('img');
        newImg.src = generatedUrl;
        newImg.alt = `AI generated ${style}`;
        newImg.className = 'gallery-img rounded-xl w-full aspect-square object-cover';
        newImg.dataset.src = generatedUrl;
        // insert at beginning
        galleryGrid.prepend(newImg);
        // re-bind click for new img
        newImg.addEventListener('click', function(e) {
          const src = this.dataset.src || this.src;
          imagePreview.src = src;
          showToast('Preview loaded', 'success');
        });
        // also update existing gallery click listeners (already bound)
      }, 1800);
    }

    // --- gallery click: update preview ---
    galleryImgs.forEach(img => {
      img.addEventListener('click', function() {
        const src = this.dataset.src || this.src;
        imagePreview.src = src;
        showToast('Preview updated', 'success');
      });
    });

    // --- generate button ---
    generateBtn.addEventListener('click', generateImage);

    // --- copy prompt ---
    copyPromptBtn.addEventListener('click', () => {
      const text = promptInput.value;
      navigator.clipboard?.writeText(text).then(() => {
        showToast('Prompt copied to clipboard', 'success');
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('Prompt copied!', 'success');
      });
    });

    // --- download image (via canvas) ---
    downloadBtn.addEventListener('click', () => {
      const imgSrc = imagePreview.src;
      if (!imgSrc || imgSrc.includes('placehold.co') && !imgSrc.includes('AI')) {
        showToast('Generate an image first!', 'error');
        return;
      }
      // create a download link
      const a = document.createElement('a');
      a.href = imgSrc;
      a.download = `nova-ai-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast('Download started', 'success');
    });

    // --- extra: enter key to generate (optional) ---
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) generateBtn.click();
    });

    // --- on load, show a toast tip ---
    window.addEventListener('load', () => {
      setTimeout(() => {
        showToast('🚀 Describe your idea and generate!', 'success');
      }, 600);
    });
  </script>
</body>
</html>
