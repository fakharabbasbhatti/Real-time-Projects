<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Navbar + Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-md fixed w-full top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Brand</div>
            
            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8">
                <a href="#" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                <a href="#" class="text-gray-700 hover:text-blue-600 transition">About</a>
                <a href="#" class="text-gray-700 hover:text-blue-600 transition">Services</a>
                <a href="#" class="text-gray-700 hover:text-blue-600 transition">Contact</a>
            </div>
            
            <button class="hidden md:block bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">
                Get Started
            </button>
            
            <!-- Mobile Menu Button -->
            <button id="menu-btn" class="md:hidden text-gray-700 text-2xl focus:outline-none">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white px-6 pb-4 space-y-3">
            <a href="#" class="block text-gray-700 hover:text-blue-600">Home</a>
            <a href="#" class="block text-gray-700 hover:text-blue-600">About</a>
            <a href="#" class="block text-gray-700 hover:text-blue-600">Services</a>
            <a href="#" class="block text-gray-700 hover:text-blue-600">Contact</a>
            <button class="w-full bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">
                Get Started
            </button>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <section class="pt-32 pb-20 px-6">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl md:text-6xl font-bold text-gray-900 mb-6">
                Build Amazing<br>
                <span class="text-blue-600">Frontend Interfaces</span>
            </h1>
            <p class="text-xl text-gray-600 max-w-2xl mx-auto mb-8">
                Create responsive, modern web applications with Tailwind CSS, Bootstrap, and vanilla JavaScript.
            </p>
            <div class="flex justify-center gap-4 flex-wrap">
                <button class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg hover:bg-blue-700 transition shadow-lg">
                    Start Building
                </button>
                <button class="border-2 border-blue-600 text-blue-600 px-8 py-3 rounded-lg text-lg hover:bg-blue-50 transition">
                    Learn More
                </button>
            </div>
        </div>
    </section>
    
    <script>
        // Mobile menu toggle
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
