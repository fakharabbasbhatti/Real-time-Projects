<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
    margin:0;
    font-family: sans-serif;
}

.chat-container{
    height:100vh;
    display:flex;
    flex-direction:column;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    padding:12px 16px;
    border-radius:15px;
    margin-bottom:15px;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#1e293b;
    margin-right:auto;
}

.input-area{
    padding:15px;
    background:#111827;
    border-top:1px solid #334155;
}

.typing-dots span{
    animation: blink 1.4s infinite both;
    font-size: 22px;
}
.typing-dots span:nth-child(2){ animation-delay: 0.2s; }
.typing-dots span:nth-child(3){ animation-delay: 0.4s; }
@keyframes blink{
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
}
</style>
</head>
<body>

<div class="chat-container">

    <div class="bg-dark p-3 shadow">
        <h4 class="m-0">🤖 AI Assistant</h4>
    </div>

    <div id="chatBox" class="chat-box">
        <div class="message bot">
            Hello! How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <div class="input-group">
            <input
                type="text"
                id="userInput"
                class="form-control"
                placeholder="Type your message..."
                autocomplete="off"
            >
            <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">
                Send
            </button>
        </div>
    </div>

</div>

<script>

// Conversation history kept in memory for real-time, context-aware replies
let conversationHistory = [];

function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

async function sendMessage(){

    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");

    let message = input.value.trim();

    if(!message) return;

    // Show user message
    chatBox.innerHTML += `
        <div class="message user">${escapeHtml(message)}</div>
    `;

    input.value = "";
    input.disabled = true;
    sendBtn.disabled = true;

    // Add to history
    conversationHistory.push({ role: "user", content: message });

    // Typing indicator
    chatBox.innerHTML += `
        <div class="message bot" id="typing">
            <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 1000,
                messages: conversationHistory
            })
        });

        const data = await response.json();

        const typingEl = document.getElementById("typing");
        if(typingEl) typingEl.remove();

        let reply = "Sorry, I couldn't generate a response.";

        if(data && data.content){
            reply = data.content
                .filter(item => item.type === "text")
                .map(item => item.text)
                .join("\n");
        }

        // Add bot reply to history
        conversationHistory.push({ role: "assistant", content: reply });

        chatBox.innerHTML += `
            <div class="message bot">${escapeHtml(reply)}</div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    }
    catch(error){

        const typingEl = document.getElementById("typing");
        if(typingEl){
            typingEl.innerHTML = "Error: " + error.message;
        }

    }
    finally{
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
    }

}

document.getElementById("userInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
