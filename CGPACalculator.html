<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family: 'Segoe UI', sans-serif;
    min-height:100vh;
    padding:40px 15px;
}

.cgpa-calculator-wrapper{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.calculator-title{
    text-align:center;
    font-weight:700;
    margin-bottom:25px;
    color:#1e293b;
}

.country-selector-section{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.add-country-link{
    text-decoration:none;
    font-weight:600;
    color:#4f46e5;
}

.usage-example-section{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    color:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
}

.example-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}

.example-boxes{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.example-box{
    background:rgba(255,255,255,.15);
    padding:15px;
    border-radius:12px;
    backdrop-filter:blur(10px);
}

.cgpa-table{
    width:100%;
}

.cgpa-table th{
    background:#111827;
    color:white;
    padding:15px;
    text-align:center;
}

.cgpa-table td{
    padding:10px;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.action-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:25px;
}

.btn{
    border-radius:12px;
    padding:12px 22px;
    font-weight:600;
}

.btn-add{
    background:#10b981;
    color:white;
}

.btn-delete{
    background:#ef4444;
    color:white;
}

.btn-calculate{
    background:#4f46e5;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

.result-section{
    margin-top:30px;
}

.result-card{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
}

.cgpa-value{
    font-size:60px;
    font-weight:800;
}

.result-details{
    background:rgba(255,255,255,.15);
    border-radius:15px;
    padding:20px;
    margin-top:15px;
}

@media(max-width:768px){
    .country-selector-section{
        flex-direction:column;
        align-items:stretch;
    }

    .cgpa-value{
        font-size:42px;
    }
}
</style>
</head>
<body>

<div class="cgpa-calculator-wrapper">

    <h1 class="calculator-title">
        <i class="fa-solid fa-graduation-cap text-primary"></i>
        CGPA Calculator
    </h1>

    <!-- Country Selector -->
    <div class="country-selector-section">
        <select id="country-selector" class="form-select w-auto">
            <option>Pakistan</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
            <option>Australia</option>
        </select>

        <a href="#" class="add-country-link">
            Want us to add your country?
        </a>
    </div>

    <!-- Example -->
    <div class="usage-example-section">
        <div class="example-header">
            <i class="fa-solid fa-circle-info fa-lg"></i>
            <h4 class="mb-0">Usage Example</h4>
        </div>

        <div class="example-boxes">
            <div class="example-box">
                Semester 1 GPA: <strong>3.50</strong><br>
                Credit Hours: <strong>16</strong>
            </div>

            <div class="example-box">
                Semester 2 GPA: <strong>3.80</strong><br>
                Credit Hours: <strong>18</strong>
            </div>
        </div>
    </div>

    <!-- Table -->
    <table class="table cgpa-table">
        <thead>
        <tr>
            <th>Semester GPA</th>
            <th>Credit Hours</th>
        </tr>
        </thead>

        <tbody id="semester-rows">

        <tr class="semester-row">
            <td>
                <input type="number"
                       class="form-control semester-gpa"
                       placeholder="Semester 1 GPA"
                       min="0"
                       max="4"
                       step="0.01">
            </td>

            <td>
                <input type="number"
                       class="form-control semester-credits"
                       placeholder="Semester 1 Credit Hours"
                       min="0">
            </td>
        </tr>

        <tr class="semester-row">
            <td>
                <input type="number"
                       class="form-control semester-gpa"
                       placeholder="Semester 2 GPA"
                       min="0"
                       max="4"
                       step="0.01">
            </td>

            <td>
                <input type="number"
                       class="form-control semester-credits"
                       placeholder="Semester 2 Credit Hours"
                       min="0">
            </td>
        </tr>

        <tr class="semester-row">
            <td>
                <input type="number"
                       class="form-control semester-gpa"
                       placeholder="Semester 3 GPA"
                       min="0"
                       max="4"
                       step="0.01">
            </td>

            <td>
                <input type="number"
                       class="form-control semester-credits"
                       placeholder="Semester 3 Credit Hours"
                       min="0">
            </td>
        </tr>

        </tbody>
    </table>

    <!-- Buttons -->
    <div class="action-buttons">

        <button id="add-semester-btn" class="btn btn-add">
            <i class="fa-solid fa-plus me-2"></i>
            Add Semester
        </button>

        <button id="delete-semester-btn" class="btn btn-delete">
            <i class="fa-solid fa-trash me-2"></i>
            Delete Semester
        </button>

        <button id="calculate-cgpa-btn" class="btn btn-calculate">
            <i class="fa-solid fa-calculator me-2"></i>
            Calculate CGPA
        </button>

    </div>

    <!-- Result -->
    <div id="result-section" class="result-section" style="display:none;">

        <div class="result-card">

            <h2>Your CGPA</h2>

            <div class="cgpa-value" id="cgpa-result">
                0.00
            </div>

            <div class="result-details">
                <p>
                    <strong>Total Credit Hours:</strong>
                    <span id="total-credits">0</span>
                </p>

                <p>
                    <strong>Total Quality Points:</strong>
                    <span id="quality-points">0.00</span>
                </p>
            </div>

        </div>

    </div>

</div>

<script>

const semesterRows = document.getElementById('semester-rows');

document.getElementById('add-semester-btn').addEventListener('click', () => {

    const count =
        document.querySelectorAll('.semester-row').length + 1;

    const row = document.createElement('tr');

    row.classList.add('semester-row');

    row.innerHTML = `
        <td>
            <input type="number"
                   class="form-control semester-gpa"
                   placeholder="Semester ${count} GPA"
                   min="0"
                   max="4"
                   step="0.01">
        </td>

        <td>
            <input type="number"
                   class="form-control semester-credits"
                   placeholder="Semester ${count} Credit Hours"
                   min="0">
        </td>
    `;

    semesterRows.appendChild(row);
});

document.getElementById('delete-semester-btn').addEventListener('click', () => {

    const rows =
        document.querySelectorAll('.semester-row');

    if(rows.length > 1){
        rows[rows.length - 1].remove();
    }
});

document.getElementById('calculate-cgpa-btn').addEventListener('click', () => {

    const gpas =
        document.querySelectorAll('.semester-gpa');

    const credits =
        document.querySelectorAll('.semester-credits');

    let totalCredits = 0;
    let totalQualityPoints = 0;

    for(let i=0;i<gpas.length;i++){

        const gpa =
            parseFloat(gpas[i].value) || 0;

        const credit =
            parseFloat(credits[i].value) || 0;

        totalCredits += credit;
        totalQualityPoints += gpa * credit;
    }

    const cgpa =
        totalCredits > 0
        ? totalQualityPoints / totalCredits
        : 0;

    document.getElementById('cgpa-result')
        .textContent = cgpa.toFixed(2);

    document.getElementById('total-credits')
        .textContent = totalCredits;

    document.getElementById('quality-points')
        .textContent = totalQualityPoints.toFixed(2);

    document.getElementById('result-section')
        .style.display = 'block';
});

</script>

</body>
</html>
